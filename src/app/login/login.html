<div class="login-container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow-sm w-100" style="max-width: 400px;">
    <h2 class="text-center mb-4">Iniciar Sesión</h2>

    <form (ngSubmit)="login()">
      <div class="mb-3">
        <label class="form-label">Usuario</label>
        <input type="text" class="form-control" [(ngModel)]="usuario" name="usuario" placeholder="usuario es  DanielM">
      </div>

      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-control" [(ngModel)]="password" name="password" placeholder="contraseña es 1234">
      </div>

      <button type="submit" class="btn btn-primary w-100">Ingresar</button>
    </form>

    <div class="text-danger text-center mt-3" *ngIf="mensaje">
      {{ mensaje }}
    </div>
  </div>
</div>

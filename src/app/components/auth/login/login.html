<div class="login-container">
  <div class="card login-card">

    <h2 class="text-center mb-4">🎬 Bienvenido</h2>

    <form (ngSubmit)="login()" #loginForm="ngForm" novalidate>

      <div class="mb-3">
        <label class="form-label">Usuario</label>
        <input 
          type="text" 
          class="form-control"
          [(ngModel)]="usuario" 
          name="usuario"
          #userInput="ngModel"
          placeholder="Ej: DanielM"
          required
        >

        <small class="text-danger" *ngIf="userInput.invalid && userInput.touched">
          ⚠ Usuario requerido
        </small>
      </div>

      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input 
          type="password" 
          class="form-control"
          [(ngModel)]="password" 
          name="password"
          placeholder="Ej: 1234"
          #passInput="ngModel"
          required
        >

        <small class="text-danger" *ngIf="passInput.invalid && passInput.touched">
          ⚠ Contraseña requerida
        </small>
      </div>

      <button 
        type="submit" 
        class="btn btn-primary w-100 login-btn"
        [disabled]="loginForm.invalid"
      >
        Ingresar
      </button>

    </form>

    <div class="error-box mt-3" *ngIf="mensaje">
      {{ mensaje }}
    </div>

  </div>
</div>

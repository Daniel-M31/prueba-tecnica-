<app-navbar></app-navbar>

<div class="salas-container py-5">
  <div class="container">
    <div class="row g-4">


      <div class="col-lg-4">
        <div class="card p-4 shadow-sm form-card">
          <h2 class="mb-4 text-center">{{ isEdit ? 'Editar Sala' : 'Nueva Sala' }}</h2>

          <form (ngSubmit)="guardarSala()" class="mb-4">
            <div class="mb-3">
              <label class="form-label">Nombre de la Sala</label>
              <input 
                type="text" 
                class="form-control" 
                placeholder="Ingrese nombre"
                [(ngModel)]="salaModel.nombre"
                name="nombre"
                required>
            </div>

            <div class="form-check mb-3">
              <input 
                class="form-check-input" 
                type="checkbox"
                [(ngModel)]="salaModel.estado"
                name="estado">
              <label class="form-check-label">Activa</label>
            </div>

            <div class="d-flex justify-content-center mt-3">
              <button type="submit" class="btn btn-success">{{ isEdit ? 'Actualizar' : 'Guardar' }}</button>
              <button type="button" class="btn btn-secondary ms-2" (click)="limpiar()">Limpiar</button>
            </div>
          </form>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="card p-3 shadow-sm h-100">
          <h3 class="mb-3 text-center">Salas Existentes</h3>
          <div class="table-responsive">
            <table class="table table-striped align-middle mb-0">
              <thead class="table-dark">
                <tr>
                  <th>ID</th>
                  <th>Nombre</th>
                  <th>Estado</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let sala of salas">
                  <td>{{ sala.id_sala }}</td>
                  <td>{{ sala.nombre }}</td>
                  <td>
                    <span class="badge" [ngClass]="sala.estado ? 'bg-success' : 'bg-danger'">
                      {{ sala.estado ? 'Activo' : 'Inactivo' }}
                    </span>
                  </td>
                  <td>
                    <button class="btn btn-sm btn-primary me-1" (click)="editarSala(sala)" [disabled]="!sala.estado">Editar</button>
                    <button class="btn btn-sm btn-danger" (click)="eliminarSala(sala)" [disabled]="!sala.estado">Eliminar</button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

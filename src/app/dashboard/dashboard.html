<app-navbar></app-navbar>
<div class="container mt-5">
  <h2 class="mb-5 text-center">🎬 Dashboard del Cine</h2>

  <div class="row g-5">

    <div class="col-md-4">
      <div class="card text-white bg-primary h-100 shadow-sm">
        <div class="card-body text-center py-5">
          <h5 class="card-title mb-4">Total de Salas</h5>
          <img src="https://www.panoramaaudiovisual.com/wp-content/uploads/2011/09/Panasonic_Cinemacity_02-web.jpg" 
               alt="Sala de Cine" 
               style="width:150px; height:150px; object-fit:cover; margin-bottom:20px;">
          <p class="display-4">{{ totalSalas }}</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card text-white bg-success h-100 shadow-sm">
        <div class="card-body text-center py-5">
          <h5 class="card-title mb-4">Salas Disponibles</h5>
          <img src="https://img.freepik.com/foto-gratis/vista-sala-cine-3d_23-2150866045.jpg" 
               alt="Sala de Cine" 
               style="width:150px; height:150px; object-fit:cover; margin-bottom:20px;">
          <p class="display-4">{{ salasDisponibles }}</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card text-white bg-warning h-100 shadow-sm">
        <div class="card-body text-center py-5">
          <h5 class="card-title mb-4">Total de Películas</h5>
          <img src="https://es.web.img3.acsta.net/newsv7/17/03/30/12/37/5706930.jpg" 
               alt="Películas" 
               style="width:150px; height:150px; object-fit:cover; margin-bottom:20px;">
          <p class="display-4">{{ totalPeliculas }}</p>
        </div>
      </div>
    </div>

  </div>
</div>
